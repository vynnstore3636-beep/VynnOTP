<script>

    // Gunakan X-USER-ID yang kamu pakai pas Execute tadi

    const apiKey = '0c24b954-07ed-4a4f-b285-1b10b5ccfef2'; 

    async function getServices() {

        const list = document.getElementById('service-list');

        const loading = document.getElementById('loading');

        try {

            const response = await fetch(`https://api.ruangotp.site/api/v1/countries/list?api_key=${apiKey}&service_id=13`);

            const res = await response.json();

            if (res.success === true) {

                loading.style.display = 'none';

                

                res.data.forEach(item => {

                    const row = `

                        <tr class="border-b border-white/5 hover:bg-white/5 transition text-sm">

                            <td class="p-4 font-medium">${item.name} (${item.prefix})</td>

                            <td class="p-4 text-gray-400">${item.stock_total} Stok</td>

                            <td class="p-4 text-green-400 font-bold">Rate: ${item.rate}</td>

                        </tr>

                    `;

                    list.innerHTML += row;

                });

            } else {

                loading.innerHTML = `<span class="text-red-400 italic">Gagal: ${res.error.message}</span>`;

            }

        } catch (error) {

            loading.innerText = "Koneksi Error. Pastikan Whitelist IP sudah benar.";

        }

    }

    getServices();

</script>
