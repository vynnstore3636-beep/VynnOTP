<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Daftar Layanan - VynnOTP</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        body { background-color: #0f172a; color: white; }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }

    </style>

</head>

<body class="p-6">

    <div class="max-w-4xl mx-auto">

        <a href="index.html" class="text-blue-400 mb-6 inline-block">← Kembali</a>

        <h1 class="text-3xl font-bold mb-6">Layanan RuangOTP</h1>

        

        <div class="glass p-6 rounded-2xl">

            <div id="loading" class="text-center py-10">

                <p class="animate-pulse">Menghubungkan ke API RuangOTP...</p>

            </div>

            <div class="overflow-x-auto">

                <table class="w-full text-left">

                    <thead>

                        <tr class="border-b border-white/10">

                            <th class="p-3">Aplikasi</th>

                            <th class="p-3">ID</th>

                            <th class="p-3">Harga</th>

                        </tr>

                    </thead>

                    <tbody id="service-list"></tbody>

                </table>

            </div>

        </div>

    </div>

    <script>

        // MASUKKAN API KEY KAMU DI SINI

        const apiKey = 'https://api.ruangotp.site/api/v1';

        async function getServices() {

            try {

                // Kita panggil endpoint 'services' dari RuangOTP

                const response = await fetch(`https://api.ruangotp.site/api/v1/services?api_key=${apiKey}`);

                const data = await response.json();

                if (data.status === true) {

                    const list = document.getElementById('service-list');

                    document.getElementById('loading').style.display = 'none';

                    data.data.forEach(service => {

                        const row = `

                            <tr class="border-b border-white/5 hover:bg-white/5 transition">

                                <td class="p-3">${service.name}</td>

                                <td class="p-3 text-gray-500">${service.id}</td>

                                <td class="p-3 text-green-400 font-bold">Rp ${service.price}</td>

                            </tr>

                        `;

                        list.innerHTML += row;

                    });

                } else {

                    document.getElementById('loading').innerText = "Gagal: " + data.message;

                }

            } catch (error) {

                document.getElementById('loading').innerText = "Error koneksi ke API.";

            }

        }

        getServices();

    </script>

</body>

</html>
