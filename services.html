<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan VynnOTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-5">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-5 text-center">Daftar Harga OTP</h1>
        
        <div id="loading" class="text-center p-10 glass rounded-xl mb-5">
            <p class="animate-bounce">Memuat Data...</p>
        </div>

        <div id="main-content" class="hidden">
            <div class="glass rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/10">
                        <tr>
                            <th class="p-3 text-sm">Negara</th>
                            <th class="p-3 text-sm">Stok</th>
                            <th class="p-3 text-sm">Harga</th>
                        </tr>
                    </thead>
                    <tbody id="service-list"></tbody>
                </table>
            </div>
        </div>

        <p id="error-msg" class="text-red-400 text-center mt-5 hidden"></p>
    </div>

    <script>
        const userId = '0c24b954-07ed-4a4f-b285-1b10b5ccfef2';

        async function fetchServices() {
            try {
                const response = await fetch('https://api.ruangotp.site/api/v1/countries/list?service_id=13', {
                    method: 'GET',
                    headers: {
                        'x-user-id': userId,
                        'Accept': 'application/json'
                    }
                });

                const res = await response.json();
                document.getElementById('loading').classList.add('hidden');

                if (res.success) {
                    document.getElementById('main-content').classList.remove('hidden');
                    const list = document.getElementById('service-list');
                    
                    res.data.forEach(item => {
                        list.innerHTML += `
                            <tr class="border-b border-white/5 hover:bg-white/5 transition">
                                <td class="p-3 text-sm font-medium">${item.name}</td>
                                <td class="p-3 text-sm text-gray-400">${item.stock_total}</td>
                                <td class="p-3 text-sm text-green-400 font-bold">Rp ${item.rate}</td>
                            </tr>
                        `;
                    });
                } else {
                    const err = document.getElementById('error-msg');
                    err.innerText = "Gagal: " + (res.error?.message || "Akses Ditolak");
                    err.classList.remove('hidden');
                }
            } catch (e) {
                document.getElementById('loading').innerText = "Koneksi Bermasalah 🗿";
            }
        }

        fetchServices();
    </script>
</body>
                              </html>
