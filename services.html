<script>

    // ID rahasia kamu dari dashboard RuangOTP

    const userId = '0c24b954-07ed-4a4f-b285-1b10b5ccfef2'; 

    async function getServices() {

        const list = document.getElementById('service-list');

        const loading = document.getElementById('loading');

        try {

            // Kita panggil API dengan menyertakan 'headers' sesuai permintaan RuangOTP

            const response = await fetch(`https://api.ruangotp.site/api/v1/countries/list?service_id=13`, {

                method: 'GET',

                headers: {

                    'x-user-id': userId,

                    'Accept': 'application/json'

                }

            });

            

            const res = await response.json();

            if (res.success === true) {

                loading.style.display = 'none';

                list.innerHTML = ''; // Bersihkan tabel

                

                res.data.forEach(item => {

                    const row = `

                        <tr class="border-b border-white/5 hover:bg-white/5 transition text-sm">

                            <td class="p-4 font-medium">${item.name} (+${item.prefix})</td>

                            <td class="p-4 text-gray-400">${item.stock_total} Stok</td>

                            <td class="p-4 text-green-400 font-bold text-right">Rp ${item.rate}</td>

                        </tr>

                    `;

                    list.innerHTML += row;

                });

            } else {

                // Jika error, kita tampilkan pesan dari server RuangOTP

                loading.innerHTML = `<span class="text-red-400 italic">Gagal: ${res.error.message}</span>`;

            }

        } catch (error) {

            loading.innerText = "Terjadi gangguan koneksi. Cek Whitelist IP.";

        }

    }

    

    getServices();

</script>
